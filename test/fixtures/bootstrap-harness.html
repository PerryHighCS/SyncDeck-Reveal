<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncDeck Bootstrap Harness</title>
</head>
<body>
  <div class="reveal">
    <aside class="controls">
      <button class="navigate-left" type="button" aria-label="Previous slide"></button>
      <button class="navigate-right" type="button" aria-label="Next slide"></button>
      <button class="navigate-up" type="button" aria-label="Up"></button>
      <button class="navigate-down" type="button" aria-label="Down"></button>
    </aside>
    <div class="slides">
      <section><h2>Intro</h2></section>
      <section>
        <section><h2>Stack A</h2></section>
        <section><h2>Stack B</h2></section>
      </section>
      <section><h2>Third</h2></section>
      <section><h2>Fourth</h2></section>
    </div>
  </div>

  <div id="storyboard" class="storyboard" aria-hidden="true">
    <div id="storyboard-track" class="storyboard-track"></div>
  </div>

  <script src="./helpers/reveal-stub.js"></script>
  <script src="../../dist/syncdeck-reveal.js"></script>
  <script>
    window.__bootstrapHarness = {
      warnings: [],
      errors: [],
      events: [],
      initConfig: null,
      pluginIds: [],
      customPluginInits: 0,
      afterInitRan: false,
      launchCalls: [],
    };

    (function captureWarnings() {
      var originalWarn = console.warn;
      var originalError = console.error;
      console.warn = function () {
        var message = Array.prototype.slice.call(arguments).join(' ');
        window.__bootstrapHarness.warnings.push(message);
        originalWarn.apply(console, arguments);
      };
      console.error = function () {
        var message = Array.prototype.slice.call(arguments).join(' ');
        window.__bootstrapHarness.errors.push(message);
        originalError.apply(console, arguments);
      };
    }());

    function buildRevealStub(asyncInitDelay, rejectInit) {
      var reveal = window.createRevealStub({
        iframeSync: {
          deckId: 'fixture-deck',
          hostOrigin: '*',
          allowedOrigins: ['*'],
          autoAnnounceReady: false,
        },
      });

      reveal.initialize = function (initConfig) {
        window.__bootstrapHarness.initConfig = initConfig;
        window.__bootstrapHarness.pluginIds = (initConfig.plugins || []).map(function (plugin) {
          return (plugin && plugin.id) || '(anonymous)';
        });
        window.__bootstrapHarness.events.push('initialize-start');

        function initPlugins() {
          (initConfig.plugins || []).forEach(function (plugin) {
            if (plugin && typeof plugin.init === 'function') {
              plugin.init(reveal);
            }
          });
        }

        if (asyncInitDelay > 0) {
          return new Promise(function (resolve) {
            setTimeout(function () {
              if (rejectInit) {
                window.__bootstrapHarness.events.push('initialize-rejected');
                resolve(Promise.reject(new Error('fixture initialize rejection')));
                return;
              }
              initPlugins();
              window.__bootstrapHarness.events.push('initialize-resolved');
              resolve({ ok: true });
            }, asyncInitDelay);
          }).then(function (value) {
            return value;
          });
        }

        if (rejectInit) {
          window.__bootstrapHarness.events.push('initialize-rejected');
          return Promise.reject(new Error('fixture initialize rejection'));
        }

        initPlugins();
        window.__bootstrapHarness.events.push('initialize-resolved');
        return { ok: true };
      };

      return reveal;
    }

    window.runBootstrapHarness = async function (options) {
      var opts = options || {};
      var originalTopLevelOverride = window.__syncdeckStandaloneHostingTopLevelOverride;
      window.__bootstrapHarness.warnings = [];
      window.__bootstrapHarness.errors = [];
      window.__bootstrapHarness.events = [];
      window.__bootstrapHarness.initConfig = null;
      window.__bootstrapHarness.pluginIds = [];
      window.__bootstrapHarness.customPluginInits = 0;
      window.__bootstrapHarness.afterInitRan = false;
      window.__bootstrapHarness.launchCalls = [];

      window.RevealNotes = { id: 'RevealNotes' };
      window.RevealChalkboard = {
        id: 'RevealChalkboard',
        getData: function () {
          return '[]';
        },
        configure: function () {},
      };
      window.Reveal = buildRevealStub(opts.asyncInitDelay || 0, !!opts.rejectInit);

      if (typeof opts.simulateTopLevelStandaloneHosting === 'boolean') {
        window.__syncdeckStandaloneHostingTopLevelOverride = opts.simulateTopLevelStandaloneHosting;
      } else {
        delete window.__syncdeckStandaloneHostingTopLevelOverride;
      }

      var customPlugin = {
        id: opts.customPluginId || 'CustomFixturePlugin',
        init: function () {
          window.__bootstrapHarness.customPluginInits += 1;
        },
      };
      var customPlugins = [customPlugin];
      if (opts.includeRequiredInCustomPlugins !== false) {
        customPlugins.push(window.RevealIframeSync);
      }

      function buildInitOptions() {
        return {
          deckId: 'fixture-deck',
          revealOverrides: {
            plugins: opts.includeCustomPlugins ? customPlugins : undefined,
          },
          chalkboardOverrides: opts.chalkboardOverrides || {},
          standaloneHosting: opts.standaloneHosting ? Object.assign({}, opts.standaloneHosting, {
            navigate: function (url) {
              window.__bootstrapHarness.launchCalls.push(String(url));
            },
          }) : undefined,
          afterInit: function () {
            if (opts.afterInitThrows) {
              throw new Error('fixture afterInit failure');
            }
            if (opts.afterInitRejects) {
              return Promise.reject(new Error('fixture afterInit async rejection'));
            }
            window.__bootstrapHarness.afterInitRan = true;
            window.__bootstrapHarness.events.push('after-init');
          },
        };
      }

      var initResult = window.initSyncDeckReveal(buildInitOptions());

      var initRejected = false;
      var initError = null;
      await Promise.resolve(initResult).catch(function (error) {
        initRejected = true;
        initError = String(error && error.message ? error.message : error);
      });
      await new Promise(function (resolve) {
        setTimeout(resolve, (opts.asyncInitDelay || 0) + 10);
      });

      if (opts.reinitStandaloneHosting) {
        await Promise.resolve(window.initSyncDeckReveal(buildInitOptions())).catch(function () {});
        await new Promise(function (resolve) {
          setTimeout(resolve, 10);
        });
      }

      if (opts.setRoleAfterInit && window.RevealIframeSyncAPI) {
        window.RevealIframeSyncAPI.setRole(opts.setRoleAfterInit);
        await new Promise(function (resolve) {
          setTimeout(resolve, 10);
        });
      }

      if (opts.clickStandaloneHostingButton) {
        var hostingButton = document.querySelector('#syncdeck-standalone-hosting .syncdeck-standalone-hosting__button');
        if (hostingButton) {
          hostingButton.click();
          await new Promise(function (resolve) {
            setTimeout(resolve, 10);
          });
        }
      }

      if (opts.extraWaitMs) {
        await new Promise(function (resolve) {
          setTimeout(resolve, opts.extraWaitMs);
        });
      }

      if (opts.waitForStandaloneHostingHidden) {
        var waitTimeoutMs = typeof opts.waitForStandaloneHostingHidden.timeoutMs === 'number'
          ? opts.waitForStandaloneHostingHidden.timeoutMs
          : 1000;
        var pollIntervalMs = typeof opts.waitForStandaloneHostingHidden.pollIntervalMs === 'number'
          ? opts.waitForStandaloneHostingHidden.pollIntervalMs
          : 20;
        var waitStartedAt = Date.now();

        await new Promise(function (resolve, reject) {
          function poll() {
            var root = document.getElementById('syncdeck-standalone-hosting');
            if (!root || root.getAttribute('data-visible') === 'false') {
              resolve();
              return;
            }

            if (Date.now() - waitStartedAt >= waitTimeoutMs) {
              reject(new Error('Timed out waiting for standalone hosting CTA to hide'));
              return;
            }

            setTimeout(poll, pollIntervalMs);
          }

          poll();
        });
      }

      var hostingRoot = document.getElementById('syncdeck-standalone-hosting');
      var hostingLogo = document.querySelector('#syncdeck-standalone-hosting .syncdeck-standalone-hosting__logo');
      var hostingButton = document.querySelector('#syncdeck-standalone-hosting .syncdeck-standalone-hosting__button');
      if (typeof originalTopLevelOverride === 'boolean') {
        window.__syncdeckStandaloneHostingTopLevelOverride = originalTopLevelOverride;
      } else {
        delete window.__syncdeckStandaloneHostingTopLevelOverride;
      }

      return {
        warnings: window.__bootstrapHarness.warnings.slice(),
        errors: window.__bootstrapHarness.errors.slice(),
        events: window.__bootstrapHarness.events.slice(),
        initConfig: window.__bootstrapHarness.initConfig,
        pluginIds: window.__bootstrapHarness.pluginIds.slice(),
        customPluginInits: window.__bootstrapHarness.customPluginInits,
        afterInitRan: window.__bootstrapHarness.afterInitRan,
        initRejected: initRejected,
        initError: initError,
        storyboardThumbs: document.querySelectorAll('#storyboard-track .story-thumb').length,
        launchCalls: window.__bootstrapHarness.launchCalls.slice(),
        buildLaunchUrlType: typeof window.buildSyncDeckLaunchUrl,
        launchPresentationType: typeof window.launchPresentationInSyncDeck,
        standaloneHostingNodes: document.querySelectorAll('#syncdeck-standalone-hosting').length,
        standaloneHostingVisible: hostingRoot ? hostingRoot.getAttribute('data-visible') === 'true' : false,
        standaloneHostingState: hostingRoot ? hostingRoot.getAttribute('data-state') : null,
        standaloneHostingAriaHidden: hostingRoot ? hostingRoot.getAttribute('aria-hidden') : null,
        standaloneHostingInert: hostingRoot ? hostingRoot.hasAttribute('inert') : false,
        standaloneHostingButtonDisabled: hostingButton ? hostingButton.disabled : null,
        standaloneHostingButtonTabIndex: hostingButton ? hostingButton.tabIndex : null,
        standaloneHostingButtonText: hostingButton ? hostingButton.textContent : null,
        standaloneHostingLogoSrc: hostingLogo ? hostingLogo.src : null,
      };
    };
  </script>
</body>
</html>
